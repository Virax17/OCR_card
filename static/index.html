<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CardScan LLM</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <div class="brand">CardScan LLM</div>
        <div id="health" class="health">Starting...</div>
      </div>
      <div class="top-actions">
        <button id="newEventBtn" class="btn ghost" type="button">New Event</button>
        <button id="downloadBtn" class="btn secondary" type="button">Download Event Excel</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel controls">
        <div class="panel-title">
          <h1>Scan Card</h1>
          <span class="mode-pill">Vision OCR + Gemini</span>
        </div>
        <div class="event-box">
          <label>
            Event
            <select id="eventSelect"></select>
          </label>
          <div id="eventMeta" class="event-meta">No event selected</div>
        </div>
        <div class="split">
          <label>
            Front
            <input id="frontInput" type="file" accept="image/*">
          </label>
          <label>
            Back optional
            <input id="backInput" type="file" accept="image/*">
          </label>
        </div>
        <button id="processBtn" class="btn primary" type="button">Process Card</button>
        <button id="resetBtn" class="btn danger" type="button">Start New File</button>
        <div id="message" class="message"></div>
        <div class="usage-box">
          <div class="usage-title">API Usage</div>
          <div id="llmUsage" class="usage-metrics">Loading...</div>
        </div>
      </section>

      <section class="panel records">
        <div class="records-head">
          <div>
            <h2>Event Records</h2>
            <div id="recordSummary" class="record-summary">Loading records...</div>
          </div>
          <div class="records-actions">
            <button id="refreshBtn" class="btn secondary" type="button">Refresh</button>
            <button id="downloadBtnInline" class="btn primary" type="button">Download Excel</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Preview</th>
                <th>Name</th>
                <th>Company</th>
                <th>Category</th>
                <th>Contact1</th>
                <th>Contact2</th>
                <th>Contact3</th>
                <th>Email1</th>
                <th>Confidence</th>
                <th>Duplicate</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="recordsBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <dialog id="editDialog">
      <form method="dialog" id="editForm">
        <h2>Edit Record</h2>
        <input type="hidden" id="editCardId">
        <label>Name<input id="editName"></label>
        <label>Designation<input id="editDesignation"></label>
        <label>Company<input id="editCompany"></label>
        <label>Business<input id="editBusiness"></label>
        <label>Email1<input id="editEmail1"></label>
        <label>Email2<input id="editEmail2"></label>
        <label>Contact1<input id="editContact1"></label>
        <label>Contact2<input id="editContact2"></label>
        <label>Contact3<input id="editContact3"></label>
        <label>Website<input id="editWebsite"></label>
        <label>Social Media<input id="editSocialMedia"></label>
        <label>Notes<textarea id="editNotes"></textarea></label>
        <label>Address<textarea id="editAddress"></textarea></label>
        <label>Category<input id="editCategory"></label>
        <div class="dialog-actions">
          <button class="btn secondary" value="cancel" type="button" onclick="document.getElementById('editDialog').close()">Cancel</button>
          <button id="saveEditBtn" class="btn primary" value="default">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="eventDialog">
      <form method="dialog" id="eventForm">
        <h2>Create Event</h2>
        <label>Event Name<input id="eventName" required placeholder="APAC Visit"></label>
        <label>Date<input id="eventDate" type="date" required></label>
        <label>Location<input id="eventLocation" placeholder="Singapore, Malaysia, Indonesia"></label>
        <div class="dialog-actions">
          <button class="btn secondary" value="cancel" type="button" onclick="document.getElementById('eventDialog').close()">Cancel</button>
          <button id="saveEventBtn" class="btn primary" value="default">Create</button>
        </div>
      </form>
    </dialog>

    <dialog id="imageDialog" class="image-dialog">
      <button id="closeImageBtn" class="modal-close" type="button">Close</button>
      <img id="fullCardImage" alt="Business card full preview">
    </dialog>

    <script src="/static/upload.js"></script>
  </body>
</html>
